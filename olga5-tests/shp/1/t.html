<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagonal Grid Background Example</title>
</head>

<body>
    <style>
        #div1 {
            border: 3px green dashed;
            height: 555px;
            width: calc(96% - 111px);
            overflow: scroll;
        }

        #cbo1 {
            height: 777px;
            width: 1222px;
            background-image:
                linear-gradient(90deg, gray 1px, transparent 1px),
                linear-gradient(0deg, gray 1px, transparent 1px);
            background-size: 30px 30px;
            background-color: antiquewhite;
            padding-top: 44px;       /* */
        }

        #div2 {
            border: 2px red solid;
            height: 555px;
            width: calc(90% - 111px);
            overflow: scroll;
        }

        #cbo2 {
            height: 777px;
            width: 1222px;
            background-image:
                linear-gradient(45deg, #cccccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #cccccc 75%);
            background-size: 20px 20px;
            background-color: antiquewhite;
        }
    </style>

    <div id="div1">
        <div id="cbo1">
            <span class="spanmark" style="color:black;">div1</span>
            <div id="div2">
                <div id="cbo2">
                    <span class="spanmark" style="color:blue;">div2</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
