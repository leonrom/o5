<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagonal Grid Background Example</title>
</head>

<body>
    <style>
        #div1 {
            border: 3px green dashed;
    height: 555px;
    width: calc(96% - 111px);
    overflow: scroll;
    position: relative;
    background-color: aliceblue;
        }

        #cbo1 {
            position: absolute;
            height: 777px;
            width: 1222px;
            background-image:
                linear-gradient(90deg, gray 1px, transparent 1px),
                linear-gradient(0deg, gray 1px, transparent 1px);
            background-size: 30px 30px;
            background-color: transparent;
            padding-top: 44px;       /* */
            padding-left: 12px;
        }
        
        #div2 {
            border: 3px red dashed;
    height: 555px;
    width: calc(90% - 111px);
    overflow: scroll;
    position: relative;
    background-color: azure;
        }

        #cbo2 {
            position: absolute;
            height: 777px;
            width: 1222px;
            background-image:
                linear-gradient(90deg, gray 1px, transparent 1px),
                linear-gradient(0deg, gray 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: transparent;
            padding-top: 44px;       /* */
            padding-left: 12px;
        }

        div span:first-child {          
    position: sticky;
    top: 6px;
    right: 4px;
    float: right;
    background-color: yellow;
    padding-right: 4px;
    padding-left: 4px;
    color:black ;
        }
    </style>

<div>111</div>
    <div id="div1">
        <span >div1</span>
        <div id="cbo1">
            <div id="div2">
                <span >div2</span>
                <div id="cbo2">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
