<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Text</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

.text-background {
    height: 100vh; /* Полная высота экрана */
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
    text-align: center;
    background: 
        repeating-linear-gradient(
            transparent,
            transparent 20px,
            rgba(0, 0, 0, 0.05) 20px,
            rgba(0, 0, 0, 0.05) 40px
        ),
        url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='40'><text x='0' y='20' font-size='20' fill='gray'>div2</text></svg>");
    background-repeat: repeat;
    background-size: auto;
}

    </style>
</head>
<body>
    <div class="text-background">Пример с повторяющимся текстом</div>
</body>
</html>
