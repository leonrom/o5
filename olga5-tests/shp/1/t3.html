<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background with Repeated Text</title>
    <style>
        .text-background {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: white;
            overflow: hidden;
        }

        .text-background::before {
            content: 'div2 ';
            font-size: 20px;
            color: lightgray;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            z-index: -1; /* Псевдоэлемент находится за основным содержимым */
        }
    </style>
</head>
<body>
    <div class="text-background">
        <p>Ваше содержимое здесь</p>
    </div>
</body>
</html>
