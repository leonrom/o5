<!DOCTYPE html>
<html lang="ru">

<head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<title>mnu</title>
</head>

<body>
	<p>
		этот и следующий два примера даны в режиме просмотра, тег &lt;<b>input </b>...&gt;: &nbsp;
		<input type="button" value="показать" o5popup_='./popup.html'>.
		Параметры окна не указываются.
		Выводится по-умолчанию (в правый верхний угол).
	</p>

	<style>
		.o5menu{
			position: absolute;
		    width: 166px;
		    padding: 1px;
		    margin: 0;
		    border: 1px solid gray;
		    background: lightcyan;
		    z-index: 100;
		    border-radius: 2px;
		    opacity: 0;
		    pointer-events: none;
		}

		.o5menu.show{
			opacity: 1;
			pointer-events: auto;
		}

		.o5menu li {
			display: block;
			position: relative;
			margin: 0;
			padding: 0;
			white-space: nowrap;
			font-family: monospace;
			border-bottom: 0.01em solid lightseagreen;
background: gray;
color: white;
height: 1.5em;
padding: 1px 5px 1px 2px;
    font-size: medium;
		}
.o5menu li:last-child {
	border-bottom:none
}
		.o5menu span {
			margin-left: 6px;
			font-family: sans-serif;
			    font-size: small;
		}

		.o5menu li:hover {
			    color: black;
			    background-color: lavender;
		}


		.o5menu li.disabled {
			color: lightgray;
			    font-style: italic;
		}
				/* .o5menu li.disabled:hover {
				    background-color: gray;
				} */

		.o5menu li.divided {
			border-top: 1px solid gray;
		}
	</style>

	<ul class="o5menu">
		<li>
				&nbsp;&#8743; <span>Развернуть на экран</span>
		</li>
		<li class="disabled">
				&nbsp;&#9671; <span>Сложить в окно</span>
		</li>
		<li class="divided">
				&nbsp;&#10005; <span>Совсем закрыть</span>
		</li>
	</ul>
	<script>
		var menu = document.querySelector('.o5menu');

		function showMenu(x, y) {
			menu.style.left = (x-12) + 'px';
			menu.style.top = (y-12) + 'px';
			menu.classList.add('show');
		}

		function hideMenu() {
			menu.classList.remove('show');
		}

		function onContextMenu(e) {
			e.preventDefault();
			showMenu(e.pageX, e.pageY);
			document.addEventListener('mousedown', onMouseDown, false);
		}

		function onMouseDown(e) {
			hideMenu();
			document.removeEventListener('mousedown', onMouseDown);
		}
		document.addEventListener('contextmenu', onContextMenu, false);
	</script>
</body>

</html>
