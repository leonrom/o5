<!DOCTYPE html>
<html lang="ru">

<head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<title>mnu</title>
</head>

<body>
	<p>
		этот и следующий два примера даны в режиме просмотра, тег &lt;<b>input </b>...&gt;: &nbsp;
		<input type="button" value="показать" o5popup_='./popup.html'>.
		Параметры окна не указываются.
		Выводится по-умолчанию (в правый верхний угол).
	</p>

	<style>
		.container {
			left: 0;
			margin: auto;
			position: absolute;
			top: 20%;
			width: 100%;
			text-align: center;
	text-align: -moz-center;
	text-align: -webkit-center;
		}

		.menu {
			position: absolute;
		    width: 200px;
		    padding: 2px;
		    margin: 0;
		    border: 1px solid gray;
		    background: lightcyan;
		    z-index: 100;
		    border-radius: 5px;
		    opacity: 0;
		    pointer-events: none;
		}

		.menu-item {
			display: block;
			position: relative;
			margin: 0;
			padding: 0;
			white-space: nowrap;
		}

		.menu-btn {
			background: none;
			line-height: normal;
			overflow: visible;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			display: block;
			width: 100%;
			color: #444;
			font-family: 'Roboto', sans-serif;
			font-size: 13px;
			text-align: left;
	text-align: -moz-left;
	text-align: -webkit-left;
			cursor: pointer;
			border: 1px solid transparent;
			white-space: nowrap;
			padding: 6px 8px;
			border-radius: 3px;
		}

		.menu-btn::-moz-focus-inner,
		.menu-btn::-moz-focus-inner {
			border: 0;
			padding: 0;
		}

		.menu-text {
			margin-left: 25px;
		}

		.menu-btn .fa {
			position: absolute;
			left: 8px;
			top: 50%;
			-webkit-transform: translateY(-50%);
			transform: translateY(-50%);
		}

		.menu-item:hover>.menu-btn {
			color: #fff;
			outline: none;
			background-color: #2E3940;
			background: -webkit-linear-gradient(to bottom, #5D6D79, #2E3940);
			background: linear-gradient(to bottom, #5D6D79, #2E3940);
			border: 1px solid #2E3940;
		}

		.menu-item.disabled {
			opacity: .5;
			pointer-events: none;
		}

		.menu-item.disabled .menu-btn {
			cursor: default;
		}

		.menu-separator {
			display: block;
			margin: 5px;
			height: 2px;
			border-bottom: 1px solid gray;
			background-color: #aaa;
		}

		.menu-item.submenu::after {
			content: "";
			position: absolute;
			right: 6px;
			top: 50%;
			-webkit-transform: translateY(-50%);
			transform: translateY(-50%);
			border: 5px solid transparent;
			border-left-color: #808080;
		}

		.menu-item.submenu:hover::after {
			border-left-color: #fff;
		}

		.menu .menu {
			top: 4px;
			left: 99%;
		}

		.show-menu,
		.menu-item:hover>.menu {
			opacity: 1;
			-webkit-transform: translate(0, 0) scale(1);
			transform: translate(0, 0) scale(1);
			pointer-events: auto;
		}

		.menu-item:hover>.menu {
			-webkit-transition-delay: 100ms;
			transition-delay: 300ms;
		}
	</style>

	<ul class="menu">
		<li class="menu-item">
			<button type="button" class="menu-btn">
				<i class="fa fa-download"></i>
				<span class="menu-text">На весь экран</span>
			</button>
		</li>
		<li class="menu-item  disabled">
			<button type="button" class="menu-btn">
				<i class="fa fa-edit"></i>
				<span class="menu-text">В окно</span>
			</button>
		</li>
		<li class="menu-separator">
		</li>
		<li class="menu-item">
			<button type="button" class="menu-btn">
				<i class="fa fa-trash"></i>
				<span class="menu-text">закрыть</span>
			</button>
		</li>
	</ul>
	<script>
		var menu = document.querySelector('.menu');

		function showMenu(x, y) {
			menu.style.left = x + 'px';
			menu.style.top = y + 'px';
			menu.classList.add('show-menu');
		}

		function hideMenu() {
			menu.classList.remove('show-menu');
		}

		function onContextMenu(e) {
			e.preventDefault();
			showMenu(e.pageX, e.pageY);
			document.addEventListener('mousedown', onMouseDown, false);
		}

		function onMouseDown(e) {
			hideMenu();
			document.removeEventListener('mousedown', onMouseDown);
		}
		document.addEventListener('contextmenu', onContextMenu, false);
	</script>
</body>

</html>
