<!DOCTYPE html>
<html lang="ru">

<head>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<title>size</title>

		<link href='./size.css' media='screen' rel='stylesheet' />
		<script src='./size.js'></script>
</head>

<body id="body">
<script>
    const matchTrim=/^[\s'"`]+|[\s'"`]+$/g,
    matchSplit=/\s*[,;]\s*/
    const MyTrim = s =>{
        return s.replace(matchTrim , '')
    }
    const MySplit = s =>{
        return s.replace(matchTrim , '').split(matchSplit )
    }
    const s1 = ` 111 ,22;, 33 ; ,,  44 ;  55 `
    console.log(s1.split(/\s*[,;]\s*/))
    console.log(s1.split(/\s*[,;]+\s*/))
    console.log(s1.split(/\s*[,;]+?\s*/))
    console.log(s1.split(/\s*$|[,;]+?\s*/))
    /*
[' 111', '22', '', '33', '', '', '44', '55 ']
[' 111', '22', '33', '', '44', '55 ']
[' 111', '22', '', '33', '', '', '44', '55 ']
[' 111 ', '22', '', '33 ', '', '', '44 ', '55', '']
    */
    console.log('----------------------------------')
    const s2 = `"" 111 ,22;, 33 ; ,,  44 ; " 55 "' `
    console.log(' >'+MyTrim(s2)+'<')
    console.log(MySplit(s2))
    console.log('----------------------------------')
    const s3 = `?o5debug=2&idf=31#asd`
    console.log(s3.split(/(\s*[?#&]+\s*)+?/))
    console.log(s3.split(/\s*[?#&]+\s*/))
    console.log(s3.split(/\s*[?#&]\s*/))
</script>
</body>
</html>
