<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #add {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
        }

        .block {
            height: 200px;
            margin: 10px;
            background: lightblue;
        }
    </style>
</head>

<body>
    <button id="add">Добавить блок</button>

    <script>
        const addBtn = document.getElementById('add');

        // Функция для добавления нового блока
        function addBlock() {
            const block = document.createElement('div');
            block.className = 'block';
            document.body.appendChild(block);
        }

        addBtn.addEventListener('click', addBlock);

        const log = (name, rect) => {
            console.log(`${name} resized: width=${rect.width}, height=${rect.height}`);
        };

        const bodyObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                log('BODY', entry.contentRect);
            }
        });

        const htmlObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                log('HTML', entry.contentRect);
            }
        });

        bodyObserver.observe(document.body);
        htmlObserver.observe(document.documentElement);
    </script>
</body>

</html>
